<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 IBK GALLERIES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;700;900&display=swap');

  :root {
    --black: #000;
    --white: #fff;
    --gray: #111;
    --gray2: #1a1a1a;
    --gray3: #2a2a2a;
    --muted: #555;
    --accent: #fff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
  }
  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    color: #fff;
  }
  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    color: #aaa;
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #fff; }

  /* ── HERO ── */
  .hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: #000;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background: #000;
  }
  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.4;
    display: none;
  }
  .hero-bg img.loaded { display: block; }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.7) 100%);
  }
  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
  }
  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 6px;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 15vw, 12rem);
    line-height: 0.85;
    letter-spacing: -2px;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero-title .line2 {
    font-size: clamp(2.5rem, 6vw, 5rem);
    letter-spacing: 10px;
    color: #888;
    font-family: 'Inter', sans-serif;
    font-weight: 300;
  }
  .hero-badge {
    display: inline-block;
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #555;
    border-top: 1px solid #222;
    border-bottom: 1px solid #222;
    padding: 8px 24px;
  }
  /* upload hero button */
  .hero-upload-btn {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
    background: none;
    border: 1px solid #333;
    color: #555;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Inter', sans-serif;
  }
  .hero-upload-btn:hover { border-color: #aaa; color: #aaa; }
  #heroFileInput { display: none; }

  /* ── POLAROID STRIP ── */
  .polaroid-section {
    background: #000;
    padding: 0;
    overflow: hidden;
    border-top: 1px solid #111;
    border-bottom: 1px solid #111;
  }
  .polaroid-track-wrap {
    overflow: hidden;
    padding: 40px 0;
    position: relative;
  }
  .polaroid-track-wrap::before,
  .polaroid-track-wrap::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 120px;
    z-index: 2;
    pointer-events: none;
  }
  .polaroid-track-wrap::before { left: 0; background: linear-gradient(to right, #000, transparent); }
  .polaroid-track-wrap::after  { right: 0; background: linear-gradient(to left, #000, transparent); }

  .polaroid-track {
    display: flex;
    gap: 24px;
    animation: scrollLeft 35s linear infinite;
    width: max-content;
  }
  .polaroid-track:hover { animation-play-state: paused; }

  @keyframes scrollLeft {
    0%   { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .polaroid {
    width: 140px;
    background: #fff;
    padding: 10px 10px 30px;
    box-shadow: 4px 4px 20px rgba(0,0,0,0.8);
    flex-shrink: 0;
    transform-origin: bottom center;
    transition: transform 0.3s;
    cursor: pointer;
    position: relative;
  }
  .polaroid:nth-child(odd)  { transform: rotate(-2deg); }
  .polaroid:nth-child(even) { transform: rotate(2deg); }
  .polaroid:hover { transform: rotate(0deg) scale(1.08) translateY(-8px); z-index: 10; }

  .polaroid-img {
    width: 120px;
    height: 120px;
    object-fit: cover;
    display: block;
    background: #e0e0e0;
  }
  .polaroid-placeholder {
    width: 120px;
    height: 120px;
    background: #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #aaa;
    font-family: 'Inter', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    flex-direction: column;
    gap: 4px;
  }
  .polaroid-placeholder span { font-size: 20px; color: #ccc; }
  .polaroid-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    color: #555;
    text-align: center;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  /* ── SECTION LABEL ── */
  .section-header {
    padding: 60px 60px 0;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .section-label {
    font-size: 10px;
    letter-spacing: 5px;
    color: #444;
    text-transform: uppercase;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    letter-spacing: 2px;
    color: #fff;
  }

  /* ── EVENTS GRID ── */
  .events-section { padding: 40px 60px 100px; }
  .events-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 2px;
  }
  .event-card {
    position: relative;
    overflow: hidden;
    cursor: pointer;
    background: #111;
    aspect-ratio: 4/3;
  }
  .event-card-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.5s, opacity 0.3s;
    opacity: 0.7;
  }
  .event-card:hover .event-card-img { transform: scale(1.05); opacity: 1; }
  .event-card-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0d0d;
    color: #222;
    font-size: 48px;
  }
  .event-card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 60%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px;
    transition: background 0.3s;
  }
  .event-card:hover .event-card-overlay { background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.2) 60%); }
  .event-card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    line-height: 1;
  }
  .event-card-meta {
    font-size: 10px;
    color: #888;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
  }
  .event-card-count {
    font-size: 10px;
    color: #555;
    margin-top: 6px;
    letter-spacing: 1px;
  }

  .no-events {
    text-align: center;
    padding: 80px 20px;
    color: #333;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    grid-column: 1/-1;
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    bottom: 36px;
    right: 36px;
    width: 60px;
    height: 60px;
    background: #fff;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    transition: transform 0.2s, background 0.2s;
  }
  .fab:hover { transform: scale(1.1) rotate(90deg); background: #e0e0e0; }
  .fab svg { width: 28px; height: 28px; stroke: #000; fill: none; stroke-width: 2.5; stroke-linecap: round; }

  /* ── MODALS ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .modal-bg.open { display: flex; }

  .modal {
    background: #0d0d0d;
    border: 1px solid #1e1e1e;
    width: 100%;
    max-width: 480px;
    padding: 40px;
    position: relative;
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    margin-bottom: 28px;
    color: #fff;
  }
  .modal input[type=text],
  .modal input[type=date] {
    width: 100%;
    background: #000;
    border: 1px solid #2a2a2a;
    padding: 14px 16px;
    color: #fff;
    font-size: 13px;
    margin-bottom: 12px;
    outline: none;
    font-family: 'Inter', sans-serif;
    letter-spacing: 1px;
    transition: border-color 0.2s;
  }
  .modal input:focus { border-color: #555; }

  .upload-zone {
    border: 1px dashed #2a2a2a;
    padding: 24px;
    text-align: center;
    cursor: pointer;
    margin-bottom: 20px;
    transition: border-color 0.2s, background 0.2s;
  }
  .upload-zone:hover { border-color: #555; background: #0a0a0a; }
  .upload-zone p { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
  .upload-zone input { display: none; }

  .modal-actions { display: flex; gap: 10px; }
  .btn-white {
    background: #fff;
    color: #000;
    border: none;
    padding: 14px 28px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
  }
  .btn-white:hover { background: #ddd; }
  .btn-ghost {
    background: transparent;
    color: #555;
    border: 1px solid #222;
    padding: 14px 28px;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .btn-ghost:hover { border-color: #555; color: #aaa; }
  .btn-danger {
    background: transparent;
    color: #c00;
    border: 1px solid #300;
    padding: 10px 20px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.2s;
  }
  .btn-danger:hover { background: #200; border-color: #600; color: #f44; }
  .close-x {
    position: absolute;
    top: 16px; right: 20px;
    background: none;
    border: none;
    color: #555;
    font-size: 24px;
    cursor: pointer;
    transition: color 0.2s;
    font-family: 'Inter', sans-serif;
    line-height: 1;
  }
  .close-x:hover { color: #fff; }

  /* ── GALLERY FULLSCREEN ── */
  .gallery-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 800;
    flex-direction: column;
  }
  .gallery-screen.open { display: flex; }
  .gallery-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 40px;
    border-bottom: 1px solid #111;
    background: #000;
    flex-shrink: 0;
  }
  .gallery-topbar-left { display: flex; flex-direction: column; gap: 2px; }
  .gallery-topbar-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
  }
  .gallery-topbar-meta { font-size: 10px; color: #555; letter-spacing: 2px; text-transform: uppercase; }
  .gallery-topbar-right { display: flex; gap: 12px; align-items: center; }

  .gallery-body {
    flex: 1;
    overflow-y: auto;
    padding: 4px;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 3px;
  }
  .g-item {
    aspect-ratio: 1;
    overflow: hidden;
    position: relative;
    background: #0d0d0d;
    cursor: pointer;
  }
  .g-item img { width: 100%; height: 100%; object-fit: cover; transition: opacity 0.2s, transform 0.3s; }
  .g-item:hover img { opacity: 0.75; transform: scale(1.03); }
  .g-item-del {
    position: absolute;
    top: 8px; right: 8px;
    width: 28px; height: 28px;
    background: rgba(0,0,0,0.85);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    line-height: 1;
  }
  .g-item:hover .g-item-del { display: flex; }
  .g-item-del:hover { background: #c00; }

  .gallery-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    min-height: 300px;
    gap: 12px;
    color: #2a2a2a;
  }
  .gallery-empty .big { font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: #111; }
  .gallery-empty p { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: #333; }

  /* upload label button */
  .upload-label {
    display: inline-block;
    background: #fff;
    color: #000;
    padding: 10px 22px;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: background 0.2s;
    border: none;
  }
  .upload-label:hover { background: #ddd; }
  .upload-label input { display: none; }

  /* ── LIGHTBOX ── */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.97);
    z-index: 1200;
    align-items: center;
    justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; }
  .lightbox-close {
    position: absolute;
    top: 20px; right: 28px;
    background: none;
    border: none;
    color: #fff;
    font-size: 36px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    line-height: 1;
  }
  .lightbox-close:hover { color: #aaa; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: #000; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-logo">5 IBK</div>
  <ul class="nav-links">
    <li><a href="#events">Events</a></li>
    <li><a href="#" onclick="openAddModal()">+ Tambah</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero-bg">
    <img id="heroBg" alt="Class Photo">
  </div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Kelas Terbaik · Kenangan Abadi</p>
    <div class="hero-title">
      <span>5 IBK</span>
      <span class="line2">GALLERIES</span>
    </div>
    <div class="hero-badge">Sekolah Menengah · 2025</div>
  </div>
  <button class="hero-upload-btn" onclick="document.getElementById('heroFileInput').click()">
    ↑ Upload Class Photo
  </button>
  <input type="file" id="heroFileInput" accept="image/*">
</section>

<!-- POLAROID STRIP -->
<div class="polaroid-section">
  <div class="polaroid-track-wrap">
    <div class="polaroid-track" id="polaroidTrack"></div>
  </div>
</div>

<!-- EVENTS -->
<div class="section-header" id="events">
  <div>
    <p class="section-label">Koleksi Kelas</p>
    <h2 class="section-title">EVENTS</h2>
  </div>
</div>
<section class="events-section">
  <div class="events-grid" id="eventsGrid"></div>
</section>

<!-- FAB -->
<button class="fab" onclick="openAddModal()" title="Tambah Event">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<!-- ADD EVENT MODAL -->
<div class="modal-bg" id="addModal">
  <div class="modal">
    <button class="close-x" onclick="closeAddModal()">×</button>
    <div class="modal-title">TAMBAH EVENT</div>
    <input type="text" id="evtName" placeholder="Nama event (cth: Hari Sukan 2025)">
    <input type="date" id="evtDate">
    <div class="upload-zone" onclick="document.getElementById('coverInput').click()">
      <input type="file" id="coverInput" accept="image/*">
      <p id="coverLabel">↑ Upload gambar cover event</p>
    </div>
    <div class="modal-actions">
      <button class="btn-white" onclick="saveEvent()">SIMPAN</button>
      <button class="btn-ghost" onclick="closeAddModal()">BATAL</button>
    </div>
  </div>
</div>

<!-- GALLERY SCREEN -->
<div class="gallery-screen" id="galleryScreen">
  <div class="gallery-topbar">
    <div class="gallery-topbar-left">
      <div class="gallery-topbar-name" id="galName">—</div>
      <div class="gallery-topbar-meta" id="galMeta">—</div>
    </div>
    <div class="gallery-topbar-right">
      <button class="btn-danger" onclick="deleteCurrentEvent()">Padam Event</button>
      <label class="upload-label">
        ↑ Upload Gambar
        <input type="file" id="galUpload" accept="image/*" multiple>
      </label>
      <button class="close-x" style="position:static;font-size:28px" onclick="closeGallery()">×</button>
    </div>
  </div>
  <div class="gallery-body">
    <div id="galContent"></div>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ── DATA ──
let events = JSON.parse(localStorage.getItem('ibk_events') || '[]');
let memberPhotos = JSON.parse(localStorage.getItem('ibk_members') || Array(25).fill(null).map((_,i)=>null).toString().split(',').map(()=>null) && 'null') || Array(25).fill(null);
let currentId = null;
let coverDataUrl = null;

// fix member photos load
try {
  memberPhotos = JSON.parse(localStorage.getItem('ibk_members')) || Array(25).fill(null);
} catch(e) {
  memberPhotos = Array(25).fill(null);
}
if (!Array.isArray(memberPhotos) || memberPhotos.length !== 25) {
  memberPhotos = Array(25).fill(null);
}

function persist() {
  localStorage.setItem('ibk_events', JSON.stringify(events));
  localStorage.setItem('ibk_members', JSON.stringify(memberPhotos));
}

// ── HERO BG ──
document.getElementById('heroFileInput').onchange = function() {
  const f = this.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    localStorage.setItem('ibk_heroBg', e.target.result);
    setHeroBg(e.target.result);
  };
  r.readAsDataURL(f);
};
function setHeroBg(src) {
  const img = document.getElementById('heroBg');
  img.src = src;
  img.classList.add('loaded');
}
const savedHero = localStorage.getItem('ibk_heroBg');
if (savedHero) setHeroBg(savedHero);

// ── POLAROID STRIP ──
function buildStrip() {
  const track = document.getElementById('polaroidTrack');
  let html = '';
  // render twice for infinite loop
  for (let pass = 0; pass < 2; pass++) {
    for (let i = 0; i < 25; i++) {
      const src = memberPhotos[i];
      html += `<div class="polaroid" onclick="openMemberUpload(${i})">`;
      if (src) {
        html += `<img class="polaroid-img" src="${src}" alt="Member ${i+1}">`;
      } else {
        html += `<div class="polaroid-placeholder"><span>+</span>${String(i+1).padStart(2,'0')}</div>`;
      }
      html += `<div class="polaroid-label">${src ? 'Member '+(i+1) : 'Klik upload'}</div></div>`;
    }
  }
  track.innerHTML = html;
}

function openMemberUpload(idx) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = () => {
    const f = inp.files[0]; if (!f) return;
    const r = new FileReader();
    r.onload = e => { memberPhotos[idx] = e.target.result; persist(); buildStrip(); };
    r.readAsDataURL(f);
  };
  inp.click();
}

// ── EVENTS GRID ──
function buildGrid() {
  const grid = document.getElementById('eventsGrid');
  if (events.length === 0) {
    grid.innerHTML = '<div class="no-events">Tiada event — tekan + untuk tambah</div>';
    return;
  }
  grid.innerHTML = events.map(ev => `
    <div class="event-card" onclick="openGallery('${ev.id}')">
      ${ev.cover
        ? `<img class="event-card-img" src="${ev.cover}" alt="${ev.name}">`
        : `<div class="event-card-placeholder">◼</div>`}
      <div class="event-card-overlay">
        <div class="event-card-name">${ev.name}</div>
        <div class="event-card-meta">${ev.date || 'Tarikh tidak ditetapkan'}</div>
        <div class="event-card-count">${(ev.photos||[]).length} gambar</div>
      </div>
    </div>`).join('');
}

// ── ADD EVENT MODAL ──
function openAddModal() { document.getElementById('addModal').classList.add('open'); }
function closeAddModal() {
  document.getElementById('addModal').classList.remove('open');
  document.getElementById('evtName').value = '';
  document.getElementById('evtDate').value = '';
  document.getElementById('coverLabel').textContent = '↑ Upload gambar cover event';
  coverDataUrl = null;
}

document.getElementById('coverInput').onchange = function() {
  const f = this.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = e => {
    coverDataUrl = e.target.result;
    document.getElementById('coverLabel').textContent = '✓ ' + f.name;
  };
  r.readAsDataURL(f);
};

function saveEvent() {
  const name = document.getElementById('evtName').value.trim();
  if (!name) { document.getElementById('evtName').focus(); return; }
  events.push({
    id: 'ev_' + Date.now(),
    name,
    date: document.getElementById('evtDate').value,
    cover: coverDataUrl || null,
    photos: []
  });
  persist();
  buildGrid();
  closeAddModal();
}

// ── GALLERY ──
function openGallery(id) {
  currentId = id;
  const ev = events.find(e => e.id === id);
  if (!ev) return;
  document.getElementById('galName').textContent = ev.name;
  document.getElementById('galMeta').textContent = (ev.date || '') + ' · ' + (ev.photos||[]).length + ' gambar';
  renderGallery(ev);
  document.getElementById('galleryScreen').classList.add('open');
}
function closeGallery() { document.getElementById('galleryScreen').classList.remove('open'); }

function renderGallery(ev) {
  const content = document.getElementById('galContent');
  const photos = ev.photos || [];
  if (photos.length === 0) {
    content.innerHTML = `<div class="gallery-empty">
      <div class="big">IBK</div>
      <p>Belum ada gambar</p>
      <p style="color:#222">Tekan "Upload Gambar" untuk mula</p>
    </div>`;
    return;
  }
  content.innerHTML = `<div class="gallery-grid">${photos.map((p,i) => `
    <div class="g-item">
      <img src="${p}" alt="Photo ${i+1}" onclick="openLightbox('${p}')">
      <button class="g-item-del" onclick="deletePhoto(${i},event)">×</button>
    </div>`).join('')}</div>`;
}

document.getElementById('galUpload').onchange = function() {
  const ev = events.find(e => e.id === currentId); if (!ev) return;
  if (!ev.photos) ev.photos = [];
  const files = Array.from(this.files);
  let done = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      ev.photos.push(e.target.result);
      done++;
      if (done === files.length) {
        persist(); buildGrid(); renderGallery(ev);
        document.getElementById('galMeta').textContent = (ev.date || '') + ' · ' + ev.photos.length + ' gambar';
      }
    };
    r.readAsDataURL(f);
  });
  this.value = '';
};

function deletePhoto(idx, e) {
  e.stopPropagation();
  const ev = events.find(e => e.id === currentId); if (!ev) return;
  if (!confirm('Padam gambar ini?')) return;
  ev.photos.splice(idx, 1);
  persist(); buildGrid(); renderGallery(ev);
  document.getElementById('galMeta').textContent = (ev.date||'') + ' · ' + ev.photos.length + ' gambar';
}

function deleteCurrentEvent() {
  const ev = events.find(e => e.id === currentId);
  if (!ev) return;
  if (!confirm(`Padam event "${ev.name}" dan semua gambarnya?`)) return;
  events = events.filter(e => e.id !== currentId);
  persist(); buildGrid(); closeGallery();
}

// ── LIGHTBOX ──
function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); }
document.getElementById('lightbox').onclick = function(e) {
  if (e.target === this) closeLightbox();
};

// ── INIT ──
buildStrip();
buildGrid();

// close modals on bg click
document.getElementById('addModal').onclick = function(e) {
  if (e.target === this) closeAddModal();
};

// keyboard esc
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeLightbox();
    closeGallery();
    closeAddModal();
  }
});
</script>
</body>
</html>
