<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IBK Galleries</title>
<style>

body{
  margin:0;
  background:#0a0a0a;
  color:white;
  font-family:Arial;
}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  overflow:hidden;
}

.polaroid{
  position:absolute;
  width:100px;
  height:100px;
  background:white;
  padding:5px;
  animation:float 6s infinite ease-in-out;
}

.polaroid img{
  width:100%;
  height:100%;
  object-fit:cover;
}

@keyframes float{
  0%{transform:translateY(0) rotate(-5deg);}
  50%{transform:translateY(-20px) rotate(5deg);}
  100%{transform:translateY(0) rotate(-5deg);}
}

/* EVENTS */
.card{
  background:#111;
  padding:15px;
  margin:10px;
  cursor:pointer;
  position:relative;
}

.del{
  position:absolute;
  right:10px;
  top:10px;
  background:none;
  border:none;
  color:white;
}

/* GALLERY */
#gallery{display:none;padding:20px;}
img{width:100px;margin:5px;border-radius:6px}

/* BUTTON */
button{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  border:none;
  font-size:30px;
  background:white;
}

</style>
</head>

<body>

<!-- HERO POLAROID (STATIC TEST IMAGE FIRST) -->
<div class="hero">

  <div class="polaroid" style="top:10%;left:10%">
    <img src="https://picsum.photos/100?1">
  </div>

  <div class="polaroid" style="top:30%;left:40%">
    <img src="https://picsum.photos/100?2">
  </div>

  <div class="polaroid" style="top:60%;left:70%">
    <img src="https://picsum.photos/100?3">
  </div>

</div>

<!-- EVENTS -->
<div id="events"></div>

<!-- GALLERY -->
<div id="gallery">
  <h2 id="title"></h2>
  <div id="images"></div>
</div>

<!-- ADD -->
<button onclick="add()">+</button>

<script>

let data = {}
let current = ""

// EVENTS
function add(){
  let name = prompt("Event name")
  if(!name) return

  data[name] = []

  let div = document.createElement("div")
  div.className = "card"
  div.innerHTML = name + "<button class='del'>x</button>"

  div.onclick = () => open(name)

  div.querySelector(".del").onclick = (e)=>{
    e.stopPropagation()
    delete data[name]
    div.remove()
  }

  document.getElementById("events").appendChild(div)
}

// OPEN EVENT
function open(name){
  current = name
  document.getElementById("gallery").style.display = "block"
  document.getElementById("title").innerText = name
  render()
}

// RENDER
function render(){
  let box = document.getElementById("images")
  box.innerHTML = ""

  data[current].forEach(src=>{
    let img = document.createElement("img")
    img.src = src
    box.appendChild(img)
  })
}

// UPLOAD (SIMPLE INPUT)
function uploadImage(file){
  let reader = new FileReader()

  reader.onload = function(e){
    data[current].push(e.target.result)
    render()
  }

  reader.readAsDataURL(file)
}

// SIMPLE UPLOAD PROMPT
function upload(){
  let file = document.createElement("input")
  file.type = "file"

  file.onchange = ()=>{
    uploadImage(file.files[0])
  }

  file.click()
}

// BUTTON = ADD OR UPLOAD
function add(){
  let mode = prompt("type: event / upload")

  if(mode === "event"){
    let name = prompt("event name")
    if(!name) return

    data[name] = []

    let div = document.createElement("div")
    div.className = "card"
    div.innerHTML = name + "<button class='del'>x</button>"

    div.onclick = ()=>open(name)

    div.querySelector(".del").onclick = (e)=>{
      e.stopPropagation()
      delete data[name]
      div.remove()
    }

    document.getElementById("events").appendChild(div)
  }

  if(mode === "upload"){
    upload()
  }
}

</script>

</body>
</html>
