<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 IBK Galleries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#0a0a0a;color:white}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    z-index:10;
}
.logo{font-weight:800;letter-spacing:2px}

/* HERO */
.hero{
    height:100vh;
    position:relative;
    overflow:hidden;
}
.hero img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s;
}
.hero img.active{opacity:1}
.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}
.hero-content{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}
.hero-content h1{font-size:55px;font-weight:800}
.hero-content p{opacity:.7;margin-top:10px}

/* BUTTON + FLOAT */
.fab-container{
    position:fixed;
    right:25px;
    bottom:25px;
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:20;
}

.fab{
    width:55px;
    height:55px;
    border-radius:50%;
    background:white;
    color:black;
    font-size:22px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

/* EVENTS */
.container{padding:80px 8%}
.section-title{margin-bottom:20px;font-weight:700}

.events{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:12px;
    cursor:pointer;
    position:relative;
}

.card h3{font-weight:600}

.del-event{
    position:absolute;
    top:10px;
    right:10px;
    background:red;
    border:none;
    color:white;
    border-radius:6px;
    padding:5px;
    cursor:pointer;
}

/* GALLERY VIEW */
.viewer{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    flex-direction:column;
    overflow-y:auto;
    z-index:999;
}

.viewer-header{
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    background:#000;
}

.viewer-title{font-weight:700}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
    padding:20px;
}

.grid img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:8px;
    cursor:pointer;
}

/* FULL IMAGE */
.full{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:none;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    z-index:1000;
}

.full img{
    max-width:90%;
    max-height:80vh;
    border-radius:10px;
}

.actions{
    margin-top:20px;
    display:flex;
    gap:20px;
    font-size:22px;
}

.icon-btn{
    background:none;
    border:none;
    color:white;
    cursor:pointer;
    font-size:22px;
}

/* UPLOAD INPUT HIDDEN */
input{display:none}

</style>
</head>

<body>

<nav>
    <div class="logo">5 IBK GALLERIES</div>
</nav>

<!-- HERO -->
<section class="hero">
    <img class="slide active" src="https://picsum.photos/id/1011/1600/900">
    <img class="slide" src="https://picsum.photos/id/1015/1600/900">
    <img class="slide" src="https://picsum.photos/id/1016/1600/900">

    <div class="hero-content">
        <h1>5 IBK GALLERIES</h1>
        <p>Every memory stays forever</p>
    </div>
</section>

<!-- EVENTS -->
<div class="container">
    <h2 class="section-title">Events</h2>
    <div class="events" id="events"></div>
</div>

<!-- FLOAT BUTTONS -->
<div class="fab-container">
    <button class="fab" onclick="addEvent()">＋</button>
    <button class="fab" onclick="document.getElementById('file').click()">⬆</button>
</div>

<input type="file" id="file" accept="image/*">

<!-- VIEWER -->
<div class="viewer" id="viewer">
    <div class="viewer-header">
        <div class="viewer-title" id="viewerTitle"></div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<!-- FULL IMAGE -->
<div class="full" id="full">
    <img id="fullImg">
    <div class="actions">
        <button class="icon-btn" onclick="downloadImg()">⬇</button>
        <button class="icon-btn" onclick="deleteImg()">🗑</button>
    </div>
</div>

<script>

let data = {};
let currentEvent = "";
let currentImgEl = null;

/* HERO SLIDE */
let slides = document.querySelectorAll(".slide");
let i=0;
setInterval(()=>{
    slides[i].classList.remove("active");
    i=(i+1)%slides.length;
    slides[i].classList.add("active");
},4000);

/* INIT DEFAULT EVENTS */
["Hari Sukan","Graduasi","Hari Guru"].forEach(addEventCard);

/* ADD EVENT */
function addEvent(){
    let name = prompt("Event name:");
    if(!name) return;
    addEventCard(name);
}

function addEventCard(name){

    if(data[name]) return;

    data[name]=[];

    let card=document.createElement("div");
    card.className="card";
    card.innerHTML=`
        <h3>${name}</h3>
        <button class="del-event" onclick="deleteEvent('${name}')">✕</button>
    `;

    card.onclick=()=>openEvent(name);

    document.getElementById("events").appendChild(card);
}

/* DELETE EVENT */
function deleteEvent(name){
    delete data[name];
    document.querySelectorAll(".card").forEach(c=>{
        if(c.innerText.includes(name)) c.remove();
    });
}

/* OPEN EVENT */
function openEvent(name){
    currentEvent=name;
    document.getElementById("viewer").style.display="flex";
    document.getElementById("viewerTitle").innerText=name;
    renderGrid();
}

/* RENDER IMAGES */
function renderGrid(){

    let grid=document.getElementById("grid");
    grid.innerHTML="";

    data[currentEvent].forEach((src,i)=>{

        let img=document.createElement("img");
        img.src=src;

        img.onclick=()=>{
            currentImgEl=i;
            document.getElementById("fullImg").src=src;
            document.getElementById("full").style.display="flex";
        };

        grid.appendChild(img);
    });
}

/* UPLOAD */
document.getElementById("file").addEventListener("change",function(e){

    if(!currentEvent){
        alert("Open event first");
        return;
    }

    let file=e.target.files[0];
    if(!file) return;

    let reader=new FileReader();

    reader.onload=function(ev){
        data[currentEvent].push(ev.target.result);
        renderGrid();
    };

    reader.readAsDataURL(file);

    this.value=""; // RESET FILE INPUT
});

/* FULL VIEW */
function downloadImg(){
    let a=document.createElement("a");
    a.href=document.getElementById("fullImg").src;
    a.download="image";
    a.click();
}

function deleteImg(){
    data[currentEvent].splice(currentImgEl,1);
    document.getElementById("full").style.display="none";
    renderGrid();
}

</script>

</body>
</html>
