<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 IBK Galleries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#0a0a0a;color:white;overflow:hidden}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    z-index:10;
}
.logo{font-weight:800;letter-spacing:2px}

/* HOME */
#home{
    height:100vh;
    padding:100px 8% 40px;
    overflow:auto;
}

.events{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:12px;
    cursor:pointer;
    position:relative;
}

.card h3{font-weight:600}

.del-event{
    position:absolute;
    top:10px;
    right:10px;
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    opacity:0.6;
}

/* VIEW MODE (NO BACK) */
#viewer{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    flex-direction:column;
    z-index:100;
}

.viewer-top{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    align-items:center;
    background:#000;
}

.viewer-title{font-weight:700}

.viewer-actions button{
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-left:10px;
    opacity:0.7;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
    padding:20px;
    overflow:auto;
}

.grid img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:8px;
}

/* FLOAT BUTTON */
.fab{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:white;
    color:black;
    font-size:28px;
    border:none;
    cursor:pointer;
    z-index:200;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:300;
}

.box{
    width:300px;
    background:#111;
    padding:20px;
    border-radius:12px;
}

.box input, .box select{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#1a1a1a;
    border:none;
    color:white;
}

.box button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    background:white;
    color:black;
    font-weight:600;
    cursor:pointer;
}
</style>
</head>

<body>

<nav>
<div class="logo">5 IBK GALLERIES</div>
</nav>

<!-- HOME -->
<div id="home">
    <h2 style="margin-bottom:20px;">Events</h2>
    <div class="events" id="events"></div>
</div>

<!-- VIEWER -->
<div id="viewer">
    <div class="viewer-top">
        <div class="viewer-title" id="viewerTitle"></div>
        <div class="viewer-actions">
            <button onclick="deleteEvent()">🗑</button>
        </div>
    </div>
    <div class="grid" id="grid"></div>
</div>

<!-- FLOAT BUTTON -->
<button class="fab" onclick="openPopup()">+</button>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="box">

        <select id="mode" onchange="switchMode()">
            <option value="upload">Upload Memory</option>
            <option value="add">Add Event</option>
        </select>

        <select id="eventSelect"></select>

        <input type="text" id="newEvent" placeholder="New event name" style="display:none;">

        <input type="file" id="file" accept="image/*">

        <button onclick="handleAction()">Confirm</button>

    </div>
</div>

<script>

let data={}
let currentEvent=""

document.getElementById("file").value=""

/* DEFAULT EVENTS */
["Hari Sukan","Graduasi","Hari Guru"].forEach(addEventCard)

function addEventCard(name){

    if(data[name]) return

    data[name]=[]

    let div=document.createElement("div")
    div.className="card"
    div.innerHTML=`
        <h3>${name}</h3>
        <button class="del-event" onclick="removeEvent('${name}',event)">✕</button>
    `

    div.onclick=()=>openEvent(name)

    document.getElementById("events").appendChild(div)

    updateSelect()
}

/* UPDATE SELECT */
function updateSelect(){

    let sel=document.getElementById("eventSelect")
    sel.innerHTML=""

    Object.keys(data).forEach(e=>{
        let opt=document.createElement("option")
        opt.value=e
        opt.textContent=e
        sel.appendChild(opt)
    })
}

/* OPEN EVENT (NO BACK) */
function openEvent(name){

    currentEvent=name
    document.getElementById("home").style.display="none"
    document.getElementById("viewer").style.display="flex"

    document.getElementById("viewerTitle").innerText=name

    render()
}

/* RENDER */
function render(){

    let grid=document.getElementById("grid")
    grid.innerHTML=""

    data[currentEvent].forEach((src,i)=>{

        let img=document.createElement("img")
        img.src=src

        grid.appendChild(img)
    })
}

/* DELETE EVENT */
function removeEvent(name,e){
    e.stopPropagation()
    delete data[name]
    location.reload()
}

/* POPUP */
function openPopup(){
    document.getElementById("popup").style.display="flex"
}

function switchMode(){

    let mode=document.getElementById("mode").value

    document.getElementById("file").style.display =
        mode==="upload"?"block":"none"

    document.getElementById("eventSelect").style.display =
        mode==="upload"?"block":"none"

    document.getElementById("newEvent").style.display =
        mode==="add"?"block":"none"
}

/* ACTION */
function handleAction(){

    let mode=document.getElementById("mode").value

    if(mode==="add"){

        let name=document.getElementById("newEvent").value
        if(!name) return

        addEventCard(name)
    }

    if(mode==="upload"){

        let file=document.getElementById("file").files[0]
        let event=document.getElementById("eventSelect").value

        if(!file||!event) return

        let reader=new FileReader()

        reader.onload=function(e){
            data[event].push(e.target.result)
            if(event===currentEvent) render()
        }

        reader.readAsDataURL(file)
    }

    document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
