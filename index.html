<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>5 IBK GALLERIES</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:'Inter',sans-serif;overflow-x:hidden}

/* HERO SLIDESHOW */
.hero{position:relative;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:#000}
.hero-bg{position:absolute;inset:0;z-index:1}
.hero-slide{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.5s ease-in-out;z-index:1}
.hero-slide.active{opacity:.45;z-index:2}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.4),rgba(0,0,0,.1) 50%,rgba(0,0,0,.85));z-index:3}
.hero-content{position:relative;z-index:4;text-align:center;pointer-events:none}

.hero-eyebrow{font-size:11px;letter-spacing:6px;color:#888;text-transform:uppercase;margin-bottom:16px}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(5rem,15vw,12rem);line-height:.85;color:#fff;display:flex;flex-direction:column;align-items:center}
.hero-title .sub{font-size:clamp(2rem,5vw,4rem);letter-spacing:10px;color:#888;font-family:'Inter',sans-serif;font-weight:300}
.hero-badge{display:inline-block;margin-top:24px;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#555;border-top:1px solid #222;border-bottom:1px solid #222;padding:8px 24px}

/* BG MANAGEMENT BUTTON */
.bg-manage-btn{position:absolute;bottom:24px;left:24px;z-index:10;background:rgba(0,0,0,0.6);border:1px solid #333;color:#aaa;font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:10px 16px;cursor:pointer;transition:all .2s;backdrop-filter:blur(4px)}
.bg-manage-btn:hover{background:#fff;color:#000;border-color:#fff}

/* POLAROID SECTION */
.polaroid-section{background:#000;overflow:hidden;border-top:1px solid #111;border-bottom:1px solid #111;position:relative}
.polaroid-track-wrap{overflow:hidden;padding:50px 0;position:relative}
.polaroid-track-wrap::before,.polaroid-track-wrap::after{content:'';position:absolute;top:0;bottom:0;width:140px;z-index:2;pointer-events:none}
.polaroid-track-wrap::before{left:0;background:linear-gradient(to right,#000,transparent)}
.polaroid-track-wrap::after{right:0;background:linear-gradient(to left,#000,transparent)}
.polaroid-track{display:flex;gap:28px;width:max-content;align-items:center;transition:transform .4s cubic-bezier(.25,.46,.45,.94)}
.polaroid-track.auto{animation:scrollLeft 35s linear infinite}
@keyframes scrollLeft{0%{transform:translateX(0)}100%{transform:translateX(calc(-50% - 14px))}}

.pol-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;background:rgba(255,255,255,0.08);border:1px solid #333;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(4px)}
.pol-nav:hover{background:rgba(255,255,255,0.18);border-color:#888}
.pol-nav.left{left:16px}
.pol-nav.right{right:16px}

.polaroid{background:#fff;padding:12px 12px 36px;box-shadow:4px 4px 20px rgba(0,0,0,.8);flex-shrink:0;transform-origin:bottom center;transition:transform .3s;cursor:pointer;position:relative}
.polaroid:nth-child(odd){transform:rotate(-2deg)}
.polaroid:nth-child(even){transform:rotate(2deg)}
.polaroid:hover{transform:rotate(0deg) scale(1.08) translateY(-8px);z-index:10}
.pol-img{object-fit:cover;display:block}
.pol-placeholder{background:#ddd;display:flex;align-items:center;justify-content:center;font-size:11px;color:#aaa;font-family:'Inter',sans-serif;letter-spacing:1px;text-transform:uppercase;flex-direction:column;gap:4px}
.pol-placeholder span{font-size:22px;color:#ccc}
.pol-label{font-family:'Inter',sans-serif;font-size:10px;font-weight:700;color:#333;text-align:center;margin-top:10px;letter-spacing:1px;text-transform:uppercase}

.pol-item-del{position:absolute;top:15px;right:15px;width:24px;height:24px;background:rgba(0,0,0,.8);border:none;border-radius:50%;color:#fff;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .2s;line-height:1;z-index:15}
.polaroid:hover .pol-item-del{display:flex}
.pol-item-del:hover{background:#c00}

/* EVENTS */
.section-hdr{padding:60px 60px 0}
.section-label{font-size:10px;letter-spacing:5px;color:#444;text-transform:uppercase}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:2px;color:#fff}
.events-section{padding:40px 60px 60px}
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:2px}
.event-card{position:relative;overflow:hidden;cursor:pointer;background:#111;aspect-ratio:4/3}
.event-card-img{width:100%;height:100%;object-fit:cover;transition:transform .5s,opacity .3s;opacity:.7}
.event-card:hover .event-card-img{transform:scale(1.05);opacity:1}
.event-card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#0d0d0d;color:#222;font-size:48px}
.event-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9),transparent 60%);display:flex;flex-direction:column;justify-content:flex-end;padding:24px}
.event-card:hover .event-card-overlay{background:linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.2) 60%)}
.event-card-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px;line-height:1}
.event-card-count{font-size:10px;color:#555;margin-top:6px;letter-spacing:1px}
.no-events{text-align:center;padding:80px 20px;color:#333;font-size:11px;letter-spacing:4px;text-transform:uppercase;grid-column:1/-1}

.footer-credit {text-align:center;padding:40px 20px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#333;border-top:1px solid #111;font-family:'Inter',sans-serif}
.footer-credit span {color:#666;font-weight:700}

.fab{position:fixed;bottom:36px;right:36px;width:60px;height:60px;background:#fff;border-radius:50%;border:none;cursor:pointer;z-index:500;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(0,0,0,.5);transition:transform .2s,background .2s}
.fab:hover{transform:scale(1.1) rotate(90deg);background:#e0e0e0}
.fab svg{width:28px;height:28px;stroke:#000;fill:none;stroke-width:2.5;stroke-linecap:round}

/* MODALS */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-bg.open{display:flex}
.modal{background:#0d0d0d;border:1px solid #1e1e1e;width:100%;max-width:460px;padding:40px;position:relative}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:3px;margin-bottom:24px;color:#fff}
.modal input[type=text]{width:100%;background:#000;border:1px solid #2a2a2a;padding:14px 16px;color:#fff;font-size:13px;margin-bottom:12px;outline:none;font-family:'Inter',sans-serif;letter-spacing:1px;transition:border-color .2s}
.modal input:focus{border-color:#555}
.upload-zone{border:1px dashed #2a2a2a;padding:20px;text-align:center;cursor:pointer;margin-bottom:20px;transition:border-color .2s}
.upload-zone:hover{border-color:#555}
.upload-zone p{font-size:10px;color:#555;letter-spacing:2px;text-transform:uppercase}
.upload-zone input{display:none}
.modal-actions{display:flex;gap:10px}
.btn-white{background:#fff;color:#000;border:none;padding:14px 28px;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.btn-white:hover{background:#ddd}
.btn-ghost{background:transparent;color:#555;border:1px solid #222;padding:14px 28px;font-size:11px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-ghost:hover{border-color:#555;color:#aaa}
.close-x{position:absolute;top:16px;right:20px;background:none;border:none;color:#555;font-size:24px;cursor:pointer;line-height:1;font-family:'Inter',sans-serif}
.close-x:hover{color:#fff}

/* MANAGED HERO LIST IN MODAL */
.bg-thumb-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px;max-height:160px;overflow-y:auto;padding-right:4px}
.bg-thumb{aspect-ratio:1;background:#222;position:relative;border:1px solid #333}
.bg-thumb img{width:100%;height:100%;object-fit:cover}
.bg-thumb-del{position:absolute;top:2px;right:2px;width:16px;height:16px;background:rgba(0,0,0,0.8);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:50%}
.bg-thumb-del:hover{background:#c00}

/* GALLERY SCREEN */
.gallery-screen{display:none;position:fixed;inset:0;background:#000;z-index:800;flex-direction:column}
.gallery-screen.open{display:flex}
.gallery-topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid #111;background:#000;flex-shrink:0}
.gallery-topbar-left{display:flex;align-items:center;gap:16px}
.back-btn{background:none;border:1px solid #2a2a2a;color:#888;font-size:10px;letter-spacing:3px;text-transform:uppercase;padding:10px 18px;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.back-btn:hover{border-color:#666;color:#fff}
.gallery-topbar-name{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:2px}
.gallery-topbar-right{display:flex;gap:12px;align-items:center}
.btn-danger{background:transparent;color:#c00;border:1px solid #300;padding:10px 20px;font-size:10px;letter-spacing:3px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all .2s}
.btn-danger:hover{background:#200;border-color:#600;color:#f44}
.upload-label{display:inline-block;background:#fff;color:#000;padding:10px 22px;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;transition:background .2s}
.upload-label:hover{background:#ddd}
.upload-label input{display:none}
.gallery-body{flex:1;overflow-y:auto;padding:4px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:3px}
.g-item{aspect-ratio:1;overflow:hidden;position:relative;background:#0d0d0d;cursor:pointer}
.g-item img{width:100%;height:100%;object-fit:cover;transition:opacity .2s,transform .3s}
.g-item:hover img{opacity:.75;transform:scale(1.03)}
.g-item-del{position:absolute;top:8px;right:8px;width:28px;height:28px;background:rgba(0,0,0,.85);border:none;border-radius:50%;color:#fff;font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:background .2s;line-height:1}
.g-item:hover .g-item-del{display:flex}
.g-item-del:hover{background:#c00}
.gallery-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:300px;gap:12px}
.gallery-empty .big{font-family:'Bebas Neue',sans-serif;font-size:80px;color:#111}
.gallery-empty p{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:#333}

.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:1200;align-items:center;justify-content:center}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;object-fit:contain}
.lightbox-close{position:absolute;top:20px;right:28px;background:none;border:none;color:#fff;font-size:36px;cursor:pointer;line-height:1}
.lightbox-close:hover{color:#aaa}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#000}
::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
</style>
</head>
<body>

<section class="hero">
  <div class="hero-bg" id="heroBgContainer"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <p class="hero-eyebrow">Kelas Terbaik · Kenangan Abadi</p>
    <div class="hero-title">
      <span>5 IBK</span>
      <span class="sub">GALLERIES</span>
    </div>
    <div class="hero-badge">Sekolah Menengah · 2025</div>
  </div>
  <button class="bg-manage-btn" onclick="openBgModal()">Urus Latar Belakang</button>
</section>

<div class="polaroid-section">
  <button class="pol-nav left" id="polLeft">&#8249;</button>
  <button class="pol-nav right" id="polRight">&#8250;</button>
  <div class="polaroid-track-wrap">
    <div class="polaroid-track auto" id="polaroidTrack"></div>
  </div>
</div>

<div class="section-hdr" id="events">
  <p class="section-label">Koleksi Kelas</p>
  <h2 class="section-title">EVENTS</h2>
</div>
<section class="events-section">
  <div class="events-grid" id="eventsGrid"></div>
</section>

<footer class="footer-credit">
  Created by <span>anepimut</span>
</footer>

<button class="fab" onclick="openAddModal()">
  <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div class="modal-bg" id="addModal">
  <div class="modal">
    <button class="close-x" onclick="closeAddModal()">×</button>
    <div class="modal-title">TAMBAH EVENT</div>
    <input type="text" id="evtName" placeholder="Nama event (cth: Hari Sukan 2025)">
    <div class="upload-zone" onclick="document.getElementById('coverInput').click()">
      <input type="file" id="coverInput" accept="image/*">
      <p id="coverLabel">↑ Upload gambar cover event</p>
    </div>
    <div class="modal-actions">
      <button class="btn-white" onclick="saveEvent()">SIMPAN</button>
      <button class="btn-ghost" onclick="closeAddModal()">BATAL</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="bgModal">
  <div class="modal">
    <button class="close-x" onclick="closeBgModal()">×</button>
    <div class="modal-title">GAMBAR SLIDESHOW</div>
    <div class="bg-thumb-grid" id="bgThumbGrid"></div>
    <div class="upload-zone" onclick="document.getElementById('bgSlidesInput').click()">
      <input type="file" id="bgSlidesInput" accept="image/*" multiple>
      <p>+ Tambah Gambar Latar Belakang</p>
    </div>
    <div class="modal-actions">
      <button class="btn-white" onclick="closeBgModal()">SELESAI</button>
    </div>
  </div>
</div>

<div class="gallery-screen" id="galleryScreen">
  <div class="gallery-topbar">
    <div class="gallery-topbar-left">
      <button class="back-btn" onclick="closeGallery()">← Balik</button>
      <div class="gallery-topbar-name" id="galName">—</div>
    </div>
    <div class="gallery-topbar-right">
      <button class="btn-danger" onclick="deleteCurrentEvent()">Padam Event</button>
      <label class="upload-label">↑ Upload Gambar<input type="file" id="galUpload" accept="image/*" multiple></label>
    </div>
  </div>
  <div class="gallery-body"><div id="galContent"></div></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
let events=JSON.parse(localStorage.getItem('ibk_events')||'[]');
let heroSlides=JSON.parse(localStorage.getItem('ibk_hero_slides')||'[]');
let memberPhotos=JSON.parse(localStorage.getItem('ibk_member_photos')||'[]');

const memberNames = [
  "adam", "asya", "darin", "dina", "amir", 
  "hanief", "melisa", "icam", "syawal", "fauzan", 
  "hadif", "irfan", "nas", "tajol", "nik", 
  "diana", "aed", "farisya", "ernee", "ezrin", 
  "sofia", "tasnim", "qaseh", "qayyum", "qash"
];

if(!Array.isArray(memberPhotos) || memberPhotos.length !== 25) {
  memberPhotos = Array(25).fill(null);
}

let currentId=null,coverDataUrl=null;
let slideIndex=0;
let slideTimer=null;
const ITEM_W=200;

function persist(){
  localStorage.setItem('ibk_events',JSON.stringify(events));
  localStorage.setItem('ibk_hero_slides',JSON.stringify(heroSlides));
  localStorage.setItem('ibk_member_photos',JSON.stringify(memberPhotos));
}

// ── HERO SLIDESHOW ──
function initSlideshow(){
  const container = document.getElementById('heroBgContainer');
  clearInterval(slideTimer);
  
  if(!heroSlides || heroSlides.length === 0){
    container.innerHTML = `<div class="hero-slide active" style="background-image: url('https://images.unsplash.com/photo-1541339907198-e08756dedf3f?q=80&w=1470')"></div>`;
    return;
  }
  
  container.innerHTML = heroSlides.map((src, i) => `
    <div class="hero-slide ${i === 0 ? 'active' : ''}" style="background-image: url('${src}')"></div>
  `).join('');
  
  slideIndex = 0;
  if(heroSlides.length > 1){
    slideTimer = setInterval(nextSlide, 4000);
  }
}

function nextSlide(){
  const slides = document.querySelectorAll('.hero-slide');
  if(!slides.length) return;
  slides[slideIndex].classList.remove('active');
  slideIndex = (slideIndex + 1) % slides.length;
  slides[slideIndex].classList.add('active');
}

function openBgModal(){
  document.getElementById('bgModal').classList.add('open');
  renderBgThumbs();
}
function closeBgModal(){
  document.getElementById('bgModal').classList.remove('open');
  initSlideshow();
}
function renderBgThumbs(){
  const grid = document.getElementById('bgThumbGrid');
  grid.innerHTML = heroSlides.map((src, i) => `
    <div class="bg-thumb">
      <img src="${src}">
      <button class="bg-thumb-del" onclick="deleteBgSlide(${i})">×</button>
    </div>
  `).join('');
}
document.getElementById('bgSlidesInput').onchange = function(){
  const files = Array.from(this.files);
  let loaded = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      heroSlides.push(e.target.result);
      loaded++;
      if(loaded === files.length) {
        persist();
        renderBgThumbs();
      }
    };
    r.readAsDataURL(f);
  });
  this.value = '';
};
function deleteBgSlide(i){
  heroSlides.splice(i, 1);
  persist();
  renderBgThumbs();
}

// ── POLAROID STRIP ──
const track=document.getElementById('polaroidTrack');
let polOffset=0;
let isAuto=true;
let autoTimer=null;

function buildStrip(){
  let html='';
  for(let pass=0;pass<2;pass++){
    for(let i=0;i<25;i++){
      const src=memberPhotos[i];
      const name=memberNames[i];
      const size=176; 
      
      html+=`<div class="polaroid" onclick="openMemberUpload(${i})">`;
      if(src){
        html+=`<img class="pol-img" src="${src}" style="width:${size}px;height:${size}px" alt="${name}">`;
        html+=`<button class="pol-item-del" onclick="deleteMemberPhoto(${i}, event)">×</button>`;
        html+=`<div class="pol-label">${name}</div>`;
      } else {
        html+=`<div class="pol-placeholder" style="width:${size}px;height:${size}px"><span>+</span>${String(i+1).padStart(2,'0')}</div>`;
        html+=`<div class="pol-label" style="color:#aaa">Upload (${name})</div>`;
      }
      html+=`</div>`;
    }
  }
  track.innerHTML=html;
}

function openMemberUpload(idx){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{
    const f=inp.files[0]; if(!f)return;
    const r=new FileReader();
    r.onload=e=>{
      memberPhotos[idx]=e.target.result;
      persist();
      buildStrip();
    };
    r.readAsDataURL(f);
  };
  inp.click();
}

function deleteMemberPhoto(idx, e){
  e.stopPropagation();
  if(!confirm('Padam gambar polaroid ' + memberNames[idx] + '?')) return;
  memberPhotos[idx] = null;
  persist();
  buildStrip();
}

function stopAuto(){
  isAuto=false; track.classList.remove('auto');
  track.style.transform=`translateX(${polOffset}px)`;
  clearTimeout(autoTimer);
}
function resumeAuto(){
  clearTimeout(autoTimer);
  autoTimer=setTimeout(()=>{
    isAuto=true; polOffset=0;
    track.style.transform=''; track.classList.add('auto');
  },4000);
}
function slideBy(dir){
  stopAuto();
  polOffset+=dir*-(ITEM_W);
  const maxOffset=-(25*ITEM_W);
  if(polOffset<maxOffset)polOffset=0;
  if(polOffset>0)polOffset=maxOffset+ITEM_W;
  track.style.transition='transform .4s cubic-bezier(.25,.46,.45,.94)';
  track.style.transform=`translateX(${polOffset}px)`;
  resumeAuto();
}
document.getElementById('polLeft').onclick=()=>slideBy(-1);
document.getElementById('polRight').onclick=()=>slideBy(1);

// ── EVENTS LOGIC ──
function buildGrid(){
  const grid=document.getElementById('eventsGrid');
  if(!events.length){grid.innerHTML='<div class="no-events">Tiada event — tekan + untuk tambah</div>';return;}
  grid.innerHTML=events.map(ev=>`
    <div class="event-card" onclick="openGallery('${ev.id}')">
      ${ev.cover?`<img class="event-card-img" src="${ev.cover}" alt="${ev.name}">`:`<div class="event-card-placeholder">◼</div>`}
      <div class="event-card-overlay">
        <div class="event-card-name">${ev.name}</div>
        <div class="event-card-count">${(ev.photos||[]).length} gambar</div>
      </div>
    </div>`).join('');
}

function openAddModal(){document.getElementById('addModal').classList.add('open');}
function closeAddModal(){
  document.getElementById('addModal').classList.remove('open');
  document.getElementById('evtName').value='';
  document.getElementById('coverLabel').textContent='↑ Upload gambar cover event';
  coverDataUrl=null;
}
document.getElementById('coverInput').onchange=function(){
  const f=this.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=e=>{coverDataUrl=e.target.result;document.getElementById('coverLabel').textContent='✓ '+f.name;};
  r.readAsDataURL(f);
};
function saveEvent(){
  const name=document.getElementById('evtName').value.trim();
  if(!name){document.getElementById('evtName').focus();return;}
  events.push({id:'ev_'+Date.now(),name,cover:coverDataUrl||null,photos:[]});
  persist();buildGrid();closeAddModal();
}

function openGallery(id){
  currentId=id;
  const ev=events.find(e=>e.id===id);if(!ev)return;
  document.getElementById('galName').textContent=ev.name;
  renderGallery(ev);
  document.getElementById('galleryScreen').classList.add('open');
}
function closeGallery(){document.getElementById('galleryScreen').classList.remove('open');}
function renderGallery(ev){
  const content=document.getElementById('galContent');
  const photos=ev.photos||[];
  if(!photos.length){content.innerHTML=`<div class="gallery-empty"><div class="big">IBK</div><p>Belum ada gambar</p><p style="color:#222;margin-top:4px">Tekan Upload Gambar untuk mula</p></div>`;return;}
  content.innerHTML=`<div class="gallery-grid">${photos.map((p,i)=>`<div class="g-item"><img src="${p}" alt="Photo ${i+1}" onclick="openLightbox('${p}')"><button class="g-item-del" onclick="deletePhoto(${i},event)">×</button></div>`).join('')}</div>`;
}
document.getElementById('galUpload').onchange=function(){
  const ev=events.find(e=>e.id===currentId);if(!ev)return;
  if(!ev.photos)ev.photos=[];
  const files=Array.from(this.files);let done=0;
  files.forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{ev.photos.push(e.target.result);done++;if(done===files.length){persist();buildGrid();renderGallery(ev);}};
    r.readAsDataURL(f);
  });
  this.value='';
};
function deletePhoto(idx,e){
  e.stopPropagation();
  const ev=events.find(e=>e.id===currentId);if(!ev)return;
  if(!confirm('Padam gambar ini?'))return;
  ev.photos.splice(idx,1);persist();buildGrid();renderGallery(ev);
}
function deleteCurrentEvent(){
  const ev=events.find(e=>e.id===currentId);if(!ev)return;
  if(!confirm('Padam event "'+ev.name+'" dan semua gambarnya?'))return;
  events=events.filter(e=>e.id!==currentId);
  persist();buildGrid();closeGallery();
}

function openLightbox(src){document.getElementById('lightboxImg').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
document.getElementById('lightbox').onclick=function(e){if(e.target===this)closeLightbox();};
document.getElementById('addModal').onclick=function(e){if(e.target===this)closeAddModal();};
document.getElementById('bgModal').onclick=function(e){if(e.target===this)closeBgModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLightbox();closeGallery();closeAddModal();closeBgModal();}});

initSlideshow();
buildStrip();
buildGrid();
</script>
</body>
</html>
