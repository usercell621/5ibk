<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 IBK Galleries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#0a0a0a;color:white;overflow:hidden}

/* NAV */
nav{
    position:fixed;
    top:0;
    width:100%;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    z-index:10;
}
.logo{font-weight:800;letter-spacing:2px}

/* HERO SLIDESHOW (KEKAL) */
.hero{
    height:100vh;
    position:relative;
    overflow:hidden;
}

.hero img{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:1s ease;
}

.hero img.active{opacity:1}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.hero-content{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.hero-content h1{
    font-size:60px;
    font-weight:900;
    letter-spacing:3px;
}

.hero-content p{
    opacity:0.7;
    margin-top:10px;
}

/* HOME */
#home{
    position:absolute;
    top:100vh;
    width:100%;
    height:100vh;
    background:#0a0a0a;
    padding:90px 8% 40px;
    overflow:auto;
}

.events{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:12px;
    cursor:pointer;
    position:relative;
}

.card h3{font-weight:600}

.del-event{
    position:absolute;
    top:10px;
    right:10px;
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
    opacity:0.6;
}

/* VIEWER */
#viewer{
    position:fixed;
    inset:0;
    background:#000;
    display:none;
    flex-direction:column;
    z-index:100;
}

.viewer-top{
    display:flex;
    justify-content:space-between;
    padding:15px 20px;
    align-items:center;
}

.viewer-actions button{
    background:none;
    border:none;
    color:white;
    font-size:18px;
    cursor:pointer;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
    gap:10px;
    padding:20px;
    overflow:auto;
}

.grid img{
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:8px;
}

/* FLOAT BTN */
.fab{
    position:fixed;
    right:20px;
    bottom:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:white;
    color:black;
    font-size:28px;
    border:none;
    cursor:pointer;
    z-index:200;
}

/* POPUP */
.popup{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:300;
}

.box{
    width:320px;
    background:#111;
    padding:20px;
    border-radius:12px;
}

.box input,.box select{
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#1a1a1a;
    border:none;
    color:white;
}

.box button{
    width:100%;
    padding:10px;
    background:white;
    border:none;
    font-weight:600;
    cursor:pointer;
}

input[type=file]{color:white}
</style>
</head>

<body>

<nav>
<div class="logo">5 IBK GALLERIES</div>
</nav>

<!-- HERO SLIDESHOW (KEKAL) -->
<section class="hero">

    <img class="slide active" src="https://picsum.photos/id/1011/1600/900">
    <img class="slide" src="https://picsum.photos/id/1015/1600/900">
    <img class="slide" src="https://picsum.photos/id/1016/1600/900">

    <div class="hero-content">
        <h1>5 IBK GALLERIES</h1>
        <p>Every memory stays forever</p>
    </div>

</section>

<!-- HOME -->
<div id="home">
    <h2 style="margin-bottom:20px;">Events</h2>
    <div class="events" id="events"></div>
</div>

<!-- VIEWER -->
<div id="viewer">
    <div class="viewer-top">
        <div id="viewerTitle"></div>
        <button onclick="deleteEvent()">🗑</button>
    </div>

    <div class="grid" id="grid"></div>
</div>

<!-- FLOAT -->
<button class="fab" onclick="openPopup()">+</button>

<!-- POPUP -->
<div class="popup" id="popup">
    <div class="box">

        <select id="mode" onchange="switchMode()">
            <option value="upload">Upload Memory</option>
            <option value="add">Add Event</option>
        </select>

        <select id="eventSelect"></select>

        <input type="text" id="newEvent" placeholder="New event name" style="display:none;">

        <input type="file" id="file">

        <button onclick="handle()">Confirm</button>

    </div>
</div>

<script>

/* SLIDESHOW (KEKAL) */
let slides=document.querySelectorAll(".slide")
let i=0

setInterval(()=>{
    slides[i].classList.remove("active")
    i=(i+1)%slides.length
    slides[i].classList.add("active")
},4000)

/* DATA */
let data={}
let current=""

/* DEFAULT */
["Hari Sukan","Graduasi","Hari Guru"].forEach(addCard)

function addCard(name){

    if(data[name]) return

    data[name]=[]

    let div=document.createElement("div")
    div.className="card"
    div.innerHTML=`
        <h3>${name}</h3>
        <button class="del-event" onclick="delEvent('${name}',event)">✕</button>
    `

    div.onclick=()=>open(name)

    document.getElementById("events").appendChild(div)

    updateSelect()
}

function updateSelect(){
    let sel=document.getElementById("eventSelect")
    sel.innerHTML=""
    Object.keys(data).forEach(e=>{
        let opt=document.createElement("option")
        opt.value=e
        opt.textContent=e
        sel.appendChild(opt)
    })
}

/* OPEN EVENT */
function open(name){
    current=name
    document.getElementById("home").style.display="none"
    document.getElementById("viewer").style.display="flex"
    document.getElementById("viewerTitle").innerText=name
    render()
}

function render(){
    let grid=document.getElementById("grid")
    grid.innerHTML=""
    data[current].forEach(src=>{
        let img=document.createElement("img")
        img.src=src
        grid.appendChild(img)
    })
}

/* DELETE EVENT */
function delEvent(name,e){
    e.stopPropagation()
    delete data[name]
    location.reload()
}

/* POPUP */
function openPopup(){
    document.getElementById("popup").style.display="flex"
}

function switchMode(){

    let mode=document.getElementById("mode").value

    document.getElementById("file").style.display=
        mode==="upload"?"block":"none"

    document.getElementById("eventSelect").style.display=
        mode==="upload"?"block":"none"

    document.getElementById("newEvent").style.display=
        mode==="add"?"block":"none"
}

function handle(){

    let mode=document.getElementById("mode").value

    if(mode==="add"){
        let name=document.getElementById("newEvent").value
        if(!name) return
        addCard(name)
    }

    if(mode==="upload"){
        let file=document.getElementById("file").files[0]
        let event=document.getElementById("eventSelect").value
        if(!file) return

        let reader=new FileReader()
        reader.onload=(e)=>{
            data[event].push(e.target.result)
            if(event===current) render()
        }
        reader.readAsDataURL(file)
    }

    document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
