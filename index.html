<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5 IBK Galleries</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,sans-serif}
body{background:#0a0a0a;color:white}

/* EVENTS */
.container{padding:80px 8%}

.events{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
}

/* CARD FIX */
.card{
  background:#111;
  padding:18px;
  border-radius:12px;
  position:relative;
  cursor:pointer;
  user-select:none;
  transition:0.2s;
}

.card:hover{
  background:#1a1a1a;
  transform:scale(1.02);
}

.title{
  font-weight:600;
}

/* DELETE BUTTON */
.del{
  position:absolute;
  top:10px;
  right:10px;
  background:none;
  border:none;
  color:white;
  opacity:0.5;
  cursor:pointer;
}

/* GALLERY */
#galleryPage{
  display:none;
  padding:80px 8%;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
}

.grid img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

/* FLOAT */
.fab{
  position:fixed;
  right:20px;
  bottom:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:white;
  color:black;
  font-size:28px;
  border:none;
  cursor:pointer;
}

/* PANEL */
.panel{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.box{
  width:320px;
  background:#111;
  padding:20px;
  border-radius:12px;
}

.box input,.box select{
  width:100%;
  padding:10px;
  margin:8px 0;
  background:#1a1a1a;
  border:none;
  color:white;
}

.box button{
  width:100%;
  padding:10px;
  background:white;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- EVENTS -->
<div class="container">
  <h2>Events</h2>
  <div class="events" id="events"></div>
</div>

<!-- GALLERY -->
<div id="galleryPage">
  <h2 id="title"></h2>
  <div class="grid" id="grid"></div>
</div>

<!-- FLOAT -->
<button class="fab" onclick="openPanel()">+</button>

<!-- PANEL -->
<div class="panel" id="panel">
  <div class="box">

    <select id="mode" onchange="modeChange()">
      <option value="upload">Upload Image</option>
      <option value="add">Add Event</option>
    </select>

    <select id="eventSelect"></select>

    <input type="text" id="eventName" placeholder="Event name" style="display:none">

    <input type="file" id="file">

    <button onclick="action()">CONFIRM</button>

  </div>
</div>

<script>

let data = {}
let current = ""

/* INIT */
["Hari Sukan","Graduasi","Hari Guru"].forEach(addEvent)

function addEvent(name){

  data[name] = []

  let div = document.createElement("div")
  div.className = "card"
  div.dataset.name = name   // 🔥 IMPORTANT

  div.innerHTML = `
    <div class="title">${name}</div>
    <button class="del">✕</button>
  `

  /* CLICK EVENT (FULL CARD) */
  div.addEventListener("click", function(e){

    if(e.target.classList.contains("del")) return

    open(name)

  })

  /* DELETE SAFE */
  div.querySelector(".del").addEventListener("click", function(e){
    e.stopPropagation()
    delete data[name]
    location.reload()
  })

  document.getElementById("events").appendChild(div)

  updateSelect()
}

function updateSelect(){
  let sel = document.getElementById("eventSelect")
  sel.innerHTML = ""
  Object.keys(data).forEach(e=>{
    let opt = document.createElement("option")
    opt.value = e
    opt.textContent = e
    sel.appendChild(opt)
  })
}

/* OPEN EVENT */
function open(name){
  current = name
  document.getElementById("galleryPage").style.display = "block"
  document.getElementById("title").innerText = name
  render()
}

/* RENDER */
function render(){
  let g = document.getElementById("grid")
  g.innerHTML = ""

  data[current].forEach(src=>{
    let img = document.createElement("img")
    img.src = src
    g.appendChild(img)
  })
}

/* PANEL */
function openPanel(){
  document.getElementById("panel").style.display = "flex"
}

function modeChange(){

  let m = document.getElementById("mode").value

  document.getElementById("eventSelect").style.display = m==="upload"?"block":"none"
  document.getElementById("file").style.display = m==="upload"?"block":"none"
  document.getElementById("eventName").style.display = m==="add"?"block":"none"
}

function action(){

  let mode = document.getElementById("mode").value

  if(mode==="add"){
    let name = document.getElementById("eventName").value
    if(!name) return
    addEvent(name)
  }

  if(mode==="upload"){

    let file = document.getElementById("file").files[0]
    let event = document.getElementById("eventSelect").value

    if(!file || !event) return

    let reader = new FileReader()

    reader.onload = function(e){

      data[event].push(e.target.result)

      if(event === current) render()

    }

    reader.readAsDataURL(file)
  }

  document.getElementById("panel").style.display = "none"
}

</script>

</body>
</html>
