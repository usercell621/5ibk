<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkib Memori Zaman Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .filter-btn { background-color: #1a1b20; border: 1px solid #2c2e36; color: #a1a1aa; transition: all 0.2s; }
        .filter-btn:hover { background-color: #22242a; color: #fff; }
        .active-filter { background-color: #2563eb !important; border-color: #2563eb !important; color: #ffffff !important; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        /* Smooth Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #121316; }
        ::-webkit-scrollbar-thumb { background: #2c2e36; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#121316] text-gray-200 font-sans min-h-screen selection:bg-blue-600 selection:text-white">

    <header class="border-b border-[#22242a] bg-[#1a1b20] sticky top-0 z-40 backdrop-blur-md bg-opacity-90">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight">🎓 Zaman Sekolah <span class="text-blue-500">Archive</span></h1>
                <p class="text-xs text-gray-500">Tempat kumpul memori, cerita pendek, dan gambar terlepas kita.</p>
            </div>
            <button id="openModalBtn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-4 py-2.5 rounded-xl transition-all shadow-lg shadow-blue-600/20 active:scale-95">
                + Kongsi Memori
            </button>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">
        
        <section class="mb-8">
            <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-3 bg-blue-500 rounded-full"></span> Pilih Acara
            </h2>
            <div id="eventFilterContainer" class="flex flex-wrap gap-2 pb-2 overflow-x-auto">
                <button id="filterAllBtn" class="filter-btn active-filter px-4 py-2 rounded-xl text-xs font-medium">Semua Gambar</button>
            </div>
        </section>

        <section>
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                </div>
        </section>
    </main>

    <div id="uploadModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden">
        <div class="bg-[#1a1b20] border border-[#2c2e36] w-full max-w-md rounded-2xl p-6 shadow-2xl transform transition-all duration-300">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-md font-bold text-white uppercase tracking-wider">Tambah Memori Baru</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-white text-2xl px-2">&times;</button>
            </div>
            <form id="postForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Pilih Gambar</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full text-xs text-gray-400 file:mr-3 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-xs file:bg-zinc-800 file:text-zinc-200 cursor-pointer" required>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Nama Acara / Event</label>
                    <input type="text" id="eventInput" placeholder="Contoh: Birthday Cikgu / Hari Sukan" class="w-full bg-[#121316] border border-[#2c2e36] rounded-xl px-4 py-3 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-blue-500"
