<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Arkib Memori Zaman Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        /* Tambahan CSS untuk reka bentuk lebih ceria */
        body {
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
        }
    </style>
</head>
<body class="text-gray-700 font-sans min-h-screen">

    <!-- Header -->
    <header class="border-b border-[#22242a] bg-white/20 sticky top-0 z-40 backdrop-blur-md bg-opacity-90 shadow-lg">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-gray-800 tracking-tight flex items-center gap-2">
                    <i class="fas fa-school"></i> 
                    <span class="bg-gradient-to-r from-yellow-400 to-orange-500 bg-clip-text text-transparent font-bold">Zaman Sekolah</span> Archive
                </h1>
                <p class="text-xs text-gray-600">Susunan memori mengikut acara & hari penting kita.</p>
            </div>
            <button id="openModalBtn" class="bg-yellow-400 hover:bg-yellow-300 text-gray-800 text-xs font-semibold px-4 py-2.5 rounded-xl transition-all shadow-lg">
                + Kongsi Memori
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Filter Section -->
        <section class="mb-8">
            <h2 class="text-xs font-bold uppercase tracking-wider text-gray-700 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-3 bg-yellow-400 rounded-full"></span> Pilih Acara / Album
            </h2>
            <div id="eventFilterContainer" class="flex flex-wrap gap-2 pb-2 overflow-x-auto">
                <button class="filter-btn active-filter px-4 py-2 rounded-xl text-xs font-medium bg-yellow-200 hover:bg-yellow-300 transition" aria-current="true">
                    Semua Gambar
                </button>
            </div>
        </section>

        <!-- Galeri Gambar -->
        <section>
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="col-span-full text-center text-gray-500 py-8" id="noImagesMsg">
                    <p class="text-sm">Tiada gambar lagi. Muat naik gambar untuk kongsi memori.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal Muat Naik -->
    <div id="uploadModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-lg transform scale-95 transition-transform duration-300">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-gray-800">Muat Naik Gambar</h3>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-800 text-xl p-1" aria-label="Tutup">&times;</button>
            </div>
            <form id="postForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-2">Pilih Gambar</label>
                    <input type="file" id="imageInput" accept="image/*" required
                        class="w-full bg-gray-100 border border-gray-300 rounded-xl px-3 py-2 text-xs cursor-pointer hover:bg-gray-200" />
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-2">Nama Acara (Event)</label>
                    <input type="text" id="eventInput" list="existingEvents" placeholder="Contoh: Birthday Cikgu / Hari Sukan" 
                        class="w-full bg-gray-100 border border-gray-300 rounded-xl px-4 py-3 text-xs focus:outline-none focus:border-yellow-400" required>
                    <datalist id="existingEvents"></datalist>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-600 uppercase mb-2">Ceritakan Memori</label>
                    <!-- Tiada textarea di sini -->
                </div>
                <div id="uploadStatus" class="hidden text-center text-xs font-medium text-blue-400 py-1"></div>
                <button type="submit" class="w-full bg-yellow-400 hover:bg-yellow-300 text-gray-800 font-semibold py-3 text-xs rounded-xl transition shadow-lg">
                    Muat Naik
                </button>
            </form>
        </div>
    </div>

    <!-- Lightbox Gambar -->
    <div id="lightboxModal" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4 hidden opacity-0 transition-opacity duration-200">
        <div class="absolute top-4 right-4 flex items-center gap-3 z-50">
            <a id="downloadBtn" href="#" download class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-2 rounded-xl text-xs flex items-center gap-2 transition" aria-label="Download Gambar">
                <i class="fas fa-download"></i> Muat Turun
            </a>
            <button id="closeLightboxBtn" class="bg-gray-700 hover:bg-gray-600 text-white w-9 h-9 flex items-center justify-center rounded-xl text-xl" aria-label="Tutup">&times;</button>
        </div>
        <div class="max-w-4xl max-h-[70vh] flex items-center justify-center overflow-hidden rounded-xl">
            <img id="lightboxImg" src="" alt="Preview" class="max-w-full max-h-[70vh] object-contain" />
        </div>
        <div class="max-w-2xl text-center mt-6 px-4">
            <span id="lightboxEvent" class="bg-yellow-400/20 text-yellow-600 border border-yellow-400/30 text-[10px] font-bold uppercase px-2.5 py-1 rounded-md">Event</span>
            <p id="lightboxDesc" class="text-sm text-gray-700 mt-3 italic">Memori ini...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-8 text-xs text-gray-600 border-t border-gray-300 mt-8">
        &copy; <span id="currentYear"></span> <!-- Tahun automatik -->
    </footer>

    <!-- Script -->
    <script class="code-block" type="module">
      // Tahun automatik
      document.getElementById('currentYear').textContent = new Date().getFullYear();

      document.addEventListener('DOMContentLoaded', () => {
        const openBtn = document.getElementById('openModalBtn');
        const closeBtn = document.getElementById('closeModalBtn');
        const modal = document.getElementById('uploadModal');

        const galleryGrid = document.getElementById('galleryGrid');
        const noImagesMsg = document.getElementById('noImagesMsg');

        // Buka modal
        openBtn.addEventListener('click', () => {
          modal.classList.remove('hidden', 'opacity-0');
          modal.classList.add('flex', 'opacity-100');
        });
        // Tutup modal
        document.getElementById('closeModalBtn').addEventListener('click', () => {
          modal.classList.add('hidden', 'opacity-0');
          modal.classList.remove('flex', 'opacity-100');
        });

        // Muat naik gambar
        document.getElementById('postForm').addEventListener('submit', function(e) {
          e.preventDefault();
          const fileInput = document.getElementById('imageInput');
          const eventInput = document.getElementById('eventInput');
          const status = document.getElementById('uploadStatus');

          if (fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
              // Buat gambar baru
              const imgDiv = document.createElement('div');
              imgDiv.className = 'cursor-pointer rounded-lg overflow-hidden shadow-lg hover:scale-105 transition-transform';

              const img = document.createElement('img');
              img.src = e.target.result;
              img.alt = eventInput.value;
              img.className = 'w-full h-48 object-cover';

              // Data untuk lightbox
              img.dataset.event = eventInput.value;
              img.dataset.desc = 'Memori ini...'; // Boleh diubah kalau mahu
              img.dataset.src = e.target.result;

              // Klik untuk buka lightbox
              img.addEventListener('click', () => {
                document.getElementById('lightboxImg').src = img.dataset.src;
                document.getElementById('lightboxEvent').textContent = img.dataset.event;
                document.getElementById('lightboxDesc').textContent = img.dataset.desc;
                // Set link muat turun
                document.getElementById('downloadBtn').href = img.dataset.src;
                // Tampilkan lightbox
                const lb = document.getElementById('lightboxModal');
                lb.classList.remove('hidden', 'opacity-0');
                lb.classList.add('flex', 'opacity-100');
              });

              imgDiv.appendChild(img);
              galleryGrid.appendChild(imgDiv);

              // Reset dan tutup modal
              document.getElementById('postForm').reset();
              document.getElementById('uploadStatus').classList.add('hidden');
              document.getElementById('uploadStatus').textContent = '';
              // Tunjukkan galeri jika dulu tiada gambar
              document.getElementById('noImagesMsg').style.display = 'none';
            };
            reader.readAsDataURL(fileInput.files[0]);
          }
        });

        // Tutup lightbox
        document.getElementById('closeLightboxBtn').addEventListener('click', () => {
          document.getElementById('lightboxModal').classList.add('hidden', 'opacity-0');
          document.getElementById('lightboxModal').classList.remove('flex', 'opacity-100');
        });
      });
    </script>
</body>
</html>
