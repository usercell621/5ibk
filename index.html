<nav>
    <div class="logo">5 IBK Galleries</div>
</nav>

<button onclick="addEvent()">+ Add Event</button>

<select id="eventSelect">
    <option>Hari Sukan</option>
    <option>Hari Guru</option>
    <option>Graduasi</option>
</select>

<input type="file" id="imageInput" accept="image/*">
<button onclick="uploadImage()">Upload</button>

<div class="events" id="eventsContainer">

    <div class="event-card">
        <h3>Hari Sukan</h3>
        <div class="gallery" id="Hari Sukan"></div>
    </div>

    <div class="event-card">
        <h3>Hari Guru</h3>
        <div class="gallery" id="Hari Guru"></div>
    </div>

    <div class="event-card">
        <h3>Graduasi</h3>
        <div class="gallery" id="Graduasi"></div>
    </div>

</div>

<div class="modal" id="imageModal">
    <img id="modalImage">

    <div class="modal-actions">

        <a id="downloadBtn" download>
            <button>Download</button>
        </a>

        <button id="deleteBtn">Delete</button>
        <button onclick="closeModal()">Close</button>

    </div>
</div>
