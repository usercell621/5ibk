<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Arkib Memori Zaman Sekolah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-[#121316] text-gray-200 font-sans min-h-screen selection:bg-blue-600 selection:text-white">

    <!-- Header -->
    <header class="border-b border-[#22242a] bg-[#1a1b20] sticky top-0 z-40 backdrop-blur-md bg-opacity-90">
        <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-white tracking-tight">
                    🎓 <span class="bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">Zaman Sekolah</span> Archive
                </h1>
                <p class="text-xs text-gray-500">Susunan memori mengikut acara & hari penting kita.</p>
            </div>
            <button id="openModalBtn" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-4 py-2.5 rounded-xl transition-all duration-200 shadow-lg shadow-blue-600/20 active:scale-95" aria-label="Kongsi Memori">
                + Kongsi Memori
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <!-- Filter Section -->
        <section class="mb-8">
            <h2 class="text-xs font-bold uppercase tracking-wider text-gray-500 mb-3 flex items-center gap-2">
                <span class="w-1.5 h-3 bg-blue-500 rounded-full"></span> Pilih Acara / Album
            </h2>
            <div id="eventFilterContainer" class="flex flex-wrap gap-2 pb-2 overflow-x-auto">
                <button class="filter-btn active-filter px-4 py-2 rounded-xl text-xs font-medium transition-all" aria-current="true">
                    Semua Gambar
                </button>
                <!-- Tambah tombol filter lain di sini jika diperlukan -->
            </div>
        </section>

        <!-- Gallery Grid -->
        <section>
            <div id="galleryGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <div class="col-span-full text-center text-gray-500 py-24">
                    <p class="text-sm">Sedang memuatkan galeri memori...</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Upload Modal -->
    <div id="uploadModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-[#1a1b20] border border-[#2c2e36] w-full max-w-md rounded-2xl p-6 shadow-2xl transform scale-95 transition-transform duration-300">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-bold text-white">Muat Naik Gambar</h3>
                <button id="closeModalBtn" class="text-gray-400 hover:text-white text-xl p-1" aria-label="Tutup">&times;</button>
            </div>
            <form id="postForm" class="space-y-4">
                <!-- Pilihan Gambar -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Pilih Gambar</label>
                    <input type="file" id="imageInput" accept="image/*" required
                        class="w-full bg-[#121316] border border-[#2c2e36] rounded-xl px-3 py-2 text-xs text-gray-400 file:mr-3 file:py-1 file:px-2.5 file:rounded-md file:border-0 file:text-xs file:font-medium file:bg-zinc-800 file:text-zinc-300 hover:file:bg-zinc-700 cursor-pointer" />
                </div>
                <!-- Nama Acara -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Nama Acara (Event)</label>
                    <input type="text" id="eventInput" list="existingEvents" placeholder="Contoh: Birthday Cikgu / Hari Sukan" 
                        class="w-full bg-[#121316] border border-[#2c2e36] rounded-xl px-4 py-3 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-blue-500" required>
                    <datalist id="existingEvents"></datalist>
                </div>
                <!-- Deskripsi -->
                <div>
                    <label class="block text-xs font-semibold text-gray-400 uppercase mb-2">Cerita Pendek / Deskripsi</label>
                    <textarea id="descInput" rows="3" placeholder="Ceritakan sedikit memori atau momen kelakar dalam gambar ni..." 
                        class="w-full bg-[#121316] border border-[#2c2e36] rounded-xl px-4 py-3 text-xs text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 resize-none" required></textarea>
                </div>
                <!-- Status Upload -->
                <div id="uploadStatus" class="hidden text-center text-xs font-medium text-blue-400 py-1"></div>
                <!-- Tombol Muat Naik -->
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 text-xs rounded-xl transition-colors mt-2 shadow-lg shadow-blue-600/10">
                    Mula Muat Naik
                </button>
            </form>
        </div>
    </div>

    <!-- Lightbox Modal -->
    <div id="lightboxModal" class="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4 hidden opacity-0 transition-opacity duration-200">
        <div class="absolute top-4 right-4 flex items-center gap-3 z-50">
            <a id="downloadBtn" href="#" download class="bg-zinc-800 hover:bg-zinc-700 text-white px-3 py-2 rounded-xl text-xs flex items-center gap-2 transition-colors" aria-label="Download Gambar">
                <i class="fa-solid fa-download"></i> Download
            </a>
            <button id="closeLightboxBtn" class="bg-zinc-800 hover:bg-zinc-700 text-white text-lg w-9 h-9 flex items-center justify-center rounded-xl" aria-label="Tutup">&times;</button>
        </div>
        <div class="max-w-4xl max-h-[70vh] flex items-center justify-center overflow-hidden rounded-xl">
            <img id="lightboxImg" src="" alt="Preview Gambar" class="max-w-full max-h-[70vh] object-contain" />
        </div>
        <div class="max-w-2xl text-center mt-6 px-4">
            <span id="lightboxEvent" class="bg-blue-600/20 text-blue-400 border border-blue-500/30 text-[10px] font-bold uppercase tracking-widest px-2.5 py-1 rounded-md">Event</span>
            <p id="lightboxDesc" class="text-sm text-gray-300 mt-3 italic">Deskripsi memori...</p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="text-center py-12 text-xs text-gray-600 border-t border-[#22242a] mt-24">
        &copy; 2026 Arkib Memori Sekolah.
    </footer>

    <!-- Script -->
    <script class="code-block" type="module" src="js/app.js"></script>

</body>
</html>
